<!DOCTYPE html>
<html>
<head>
    <title>Mini App Divertida</title>
    <style>
        body {
            text-align: center;
            font-family: Comic Sans MS, cursive;
            transition: background-color 0.5s;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: #ff69b4;
            color: white;
        }

        #resultado {
            font-size: 28px;
            margin-top: 20px;
            transition: transform 0.3s;
        }
    </style>
</head>
<body>

    <h2>🎉 El oráculo del tacuazín supremo 🎉</h2>
    <button onclick="generar()">Haz clic (si te atreves)</button>
    <p id="resultado"></p>

    <script>
        function generar() {
            let opciones = [
                "Sí 😎",
                "No 😅",
                "Tal vez... 👀",
                "Pregúntale al tacuazín 🐭",
                "El garrobo dice que sí 🦎",
                "Eso lo decide el guasalo 🤨",
                "Ni el tacuazín sabe 🤷",
                "El garrobo se fue, intenta luego 😂",
                "Guasalo confirmado ✅",
                "Error: tacuazín confundido 🤯",
                "El chichalaco lo aprueba 🐦",
                "Chichalaco enojado... mejor no 😡",
                "Consulta cancelada por el chichalaco 🚫",
                "Sí, pero solo si el chichalaco canta 🎶"
            ];

            let colores = ["#ffcccc", "#ccffcc", "#ccccff", "#ffffcc", "#ffccee"];

            let random = Math.floor(Math.random() * opciones.length);
            let colorRandom = Math.floor(Math.random() * colores.length);

            let resultado = document.getElementById('resultado');

            resultado.innerText = opciones[random];
            resultado.style.transform = "scale(1.6)";

            document.body.style.backgroundColor = colores[colorRandom];

            setTimeout(() => {
                resultado.style.transform = "scale(1)";
            }, 300);
        }
    </script>

</body>
</html>
